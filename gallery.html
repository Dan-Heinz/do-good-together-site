<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery | Do Good Together Coalition</title>
    <meta name="description" content="View our gallery of community impact." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link href="/src/style.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
</head>

<body class="bg-gray-50 text-gray-800 font-sans antialiased">
    <!-- Header (Simplified for subpage) -->
    <header class="fixed w-full top-0 z-50 glass border-b border-white/40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex-shrink-0 flex items-center gap-3">
                    <a href="/" class="flex items-center gap-3 group">
                        <img src="/images/logo.png" alt="Do Good Together Logo" class="w-12 h-12 object-contain" />
                        <span
                            class="font-bold text-2xl text-primaryHover tracking-tight group-hover:text-primary transition-colors">Do
                            Good Together</span>
                    </a>
                </div>
                <nav class="hidden md:flex space-x-8">
                    <a href="/" class="text-gray-700 hover:text-primary transition-colors font-medium">Home</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="pt-32 pb-24">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-16">
                <h1 class="text-4xl md:text-5xl font-extrabold text-gray-900 mb-6 tracking-tight">Our Impact in Photos
                </h1>
                <p class="text-xl text-gray-600 max-w-2xl mx-auto">See the tangible difference we're making in our
                    community, week by week.</p>
            </div>

            <!-- Responsive Image Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Image 1 -->
                <div onclick="openLightbox('/images/646880661_10230248799835550_8782865929574047533_n.jpg')"
                    class="group relative overflow-hidden rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 aspect-[4/3] cursor-pointer">
                    <img src="/images/646880661_10230248799835550_8782865929574047533_n.jpg"
                        alt="Park Cleanup Project"
                        class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700" />
                    <div
                        class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end">
                        <div
                            class="p-6 text-white transform translate-y-4 group-hover:translate-y-0 transition-transform duration-300 text-center w-full">
                            <h3 class="text-2xl font-bold tracking-tight">Park Cleanup</h3>
                        </div>
                    </div>
                </div>

                <!-- Image 2 -->
                <div onclick="openLightbox('/images/647432487_10230277876522449_1858690239405270333_n.jpg')"
                    class="group relative overflow-hidden rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 aspect-[4/3] cursor-pointer">
                    <img src="/images/647432487_10230277876522449_1858690239405270333_n.jpg"
                        alt="Community Support Event"
                        class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700" />
                    <div
                        class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end">
                        <div
                            class="p-6 text-white transform translate-y-4 group-hover:translate-y-0 transition-transform duration-300 text-center w-full">
                            <h3 class="text-2xl font-bold tracking-tight">Community Support</h3>
                        </div>
                    </div>
                </div>

                <!-- Image 3 -->
                <div onclick="openLightbox('/images/649285046_10230277875762430_8854177436642997350_n.jpg')"
                    class="group relative overflow-hidden rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 aspect-[4/3] cursor-pointer">
                    <img src="/images/649285046_10230277875762430_8854177436642997350_n.jpg"
                        alt="Coalition Planning Session"
                        class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700" />
                    <div
                        class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end">
                        <div
                            class="p-6 text-white transform translate-y-4 group-hover:translate-y-0 transition-transform duration-300 text-center w-full">
                            <h3 class="text-2xl font-bold tracking-tight">Planning Session</h3>
                        </div>
                    </div>
                </div>

                <!-- Image 4 -->
                <div onclick="openLightbox('/images/649472394_10230261366069698_2371532116351509395_n.jpg')"
                    class="group relative overflow-hidden rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 aspect-[4/3] cursor-pointer">
                    <img src="/images/649472394_10230261366069698_2371532116351509395_n.jpg"
                        alt="Local Impact Walk"
                        class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700" />
                    <div
                        class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end">
                        <div
                            class="p-6 text-white transform translate-y-4 group-hover:translate-y-0 transition-transform duration-300 text-center w-full">
                            <h3 class="text-2xl font-bold tracking-tight">Impact Walk</h3>
                        </div>
                    </div>
                </div>

                <!-- Image 5 -->
                <div onclick="openLightbox('/images/626350041_10229900660292279_6144442280029296215_n.jpg')"
                    class="group relative overflow-hidden rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 aspect-[4/3] cursor-pointer">
                    <img src="/images/626350041_10229900660292279_6144442280029296215_n.jpg"
                        alt="Neighbors Helping Neighbors"
                        class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700" />
                    <div
                        class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end">
                        <div
                            class="p-6 text-white transform translate-y-4 group-hover:translate-y-0 transition-transform duration-300 text-center w-full">
                            <h3 class="text-2xl font-bold tracking-tight">Neighbor Support</h3>
                        </div>
                    </div>
                </div>
                
                <!-- Image 6 -->
                <div onclick="openLightbox('/images/636962431_10230051340099180_7728577641282278729_n.jpg')"
                  class="group relative overflow-hidden rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 aspect-[4/3] cursor-pointer">
                  <img src="/images/636962431_10230051340099180_7728577641282278729_n.jpg"
                      alt="Volunteer Service Event"
                      class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700" />
                  <div
                      class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end">
                      <div
                          class="p-6 text-white transform translate-y-4 group-hover:translate-y-0 transition-transform duration-300 text-center w-full">
                          <h3 class="text-2xl font-bold tracking-tight">Service Together</h3>
                      </div>
                  </div>
              </div>
            </div>

            <div class="mt-16 text-center">
                <a href="/"
                    class="inline-flex items-center gap-2 text-primary font-bold hover:text-primaryHover transition-colors border-b-2 border-transparent hover:border-primaryHover pb-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Back to Home
                </a>
            </div>
        </div>
    </main>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="fixed inset-0 z-[100] bg-black/90 hidden flex items-center justify-center p-4" onclick="closeLightbox()">
        <button class="absolute top-6 right-6 text-white hover:text-gray-300 transition-colors" onclick="closeLightbox()">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
        <img id="lightbox-img" src="" alt="Full view" class="max-w-full max-h-[90vh] rounded-lg shadow-2xl transition-transform duration-300" onclick="event.stopPropagation()">
    </div>

    <script>
        function openLightbox(src) {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = src;
            lightbox.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            
            // Add scale animation
            setTimeout(() => {
                img.classList.add('scale-100');
                img.classList.remove('scale-95');
            }, 10);
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.classList.add('scale-95');
            img.classList.remove('scale-100');
            
            setTimeout(() => {
                lightbox.classList.add('hidden');
                document.body.style.overflow = '';
            }, 200);
        }

        // Close on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
</body>

</html>
